server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Redireciona qualquer rota para o index.html
    # Necessário para o React Router funcionar
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para o backend — evita problema de CORS
    # O frontend chama /api/..., o nginx encaminha para o backend
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
